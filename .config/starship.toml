command_timeout = 3600000
format = """
[в•ӯ](fg:current_line)\
$os\
$directory\
$git_branch\
$git_status\
$fill\
$nodejs\
$bun\
$deno\
$aws\
$cmd_duration\
$shell\
$python\
$time\
$username\
$line_break\
$character\
"""

palette = 'dracula'
add_newline = true

[palettes.dracula]
foreground = '#F8F8F2'
background = '#282A36'
current_line = '#44475A'
primary = '#1E1F29'
box = '#44475A'
blue = '#6272A4'
cyan = '#8BE9FD'
green = '#50FA7B'
orange = '#FFB86C'
pink = '#FF79C6'
purple = '#BD93F9'
red = '#FF5555'
yellow = '#F1FA8C'

[os]
format = '(fg:current_line)[оӮ¶](fg:red)[$symbol ](fg:primary bg:red)[оӮҙ](fg:red)'
disabled = false

[os.symbols]
Alpine = 'пҢҖ'
Amazon = 'пү°'
Android = 'оңҺ'
Arch = 'пҢғ'
CentOS = 'пҢ„'
Debian = 'пҢҶ'
EndeavourOS = 'пҢў'
Fedora = 'пҢҠ'
FreeBSD = 'пҢҢ'
Garuda = 'п…ј'
Gentoo = 'пҢҚ'
Linux = 'п…ј'
Macos = 'пҢӮ'
Manjaro = 'пҢ’'
Mariner = 'п…ј'
Mint = 'пҢҺ'
NetBSD = 'п…ј'
NixOS = 'пҢ“'
OpenBSD = 'пҢЁ'
OpenCloudOS = 'о®Ә'
openEuler = 'п…ј'
openSUSE = 'пҢ”'
OracleLinux = 'вҠӮвҠғ'
Pop = 'пҢӘ'
Raspbian = 'пҢ•'
Redhat = 'пҢ–'
RedHatEnterprise = 'пҢ–'
Solus = 'пҢӯ'
SUSE = 'пҢ”'
Ubuntu = 'пҢӣ'
Unknown = 'п„Ҳ'
Windows = 'оңҸ'

[directory]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:pink)[у°·Ҹ ](fg:primary bg:pink)[оӮҙ](fg:pink bg:box)[ $read_only$truncation_symbol$path](fg:foreground bg:box)[оӮҙ](fg:box)'
home_symbol = "оӯҶ ~/"
truncation_symbol = 'оҜҹ '
truncation_length = 2
read_only = 'уұ§ө '
read_only_style = ''

[git_branch]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $branch](fg:foreground bg:box)'
symbol = 'пҗ— '

[git_status]
format = '[( $all_status)](fg:foreground bg:box)[оӮҙ](fg:box)'

[nodejs]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
detect_files = ["package.json", ".node-version", "!bunfig.toml", "!bun.lockb"]

[bun]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'рҹҘҹ'

[deno]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'рҹҰ•'

[aws]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:purple)[$symbol](fg:primary bg:purple)[оӮҙ](fg:purple bg:box)[ $profile](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'вҳҒпёҸ'

[python]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'рҹҗҚ'

[fill]
symbol = 'в”Җ'
style = 'fg:current_line'

[cmd_duration]
min_time = 500
format = '[в”Җ](fg:current_line)[оӮ¶](fg:orange)[пғ§ ](fg:primary bg:orange)[оӮҙ](fg:orange bg:box)[ $duration ](fg:foreground bg:box)[оӮҙ](fg:box)'

[shell]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:blue)[п’ү ](fg:primary bg:blue)[оӮҙ](fg:blue bg:box)[ $indicator](fg:foreground bg:box)[оӮҙ](fg:box)'
disabled = false

[time]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:purple)[у°Ұ– ](fg:primary bg:purple)[оӮҙ](fg:purple bg:box)[ $time](fg:foreground bg:box)[оӮҙ](fg:box)'
time_format = '%H:%M'
disabled = false

[username]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:yellow)[пҗ• ](fg:primary bg:yellow)[оӮҙ](fg:yellow bg:box)[ $user](fg:foreground bg:box)[оӮҙ](fg:box) '
show_always = true

[character]
format = """
[в”Ӯ](fg:current_line)
[в•°в”Җ$symbol](fg:current_line) """
success_symbol = '[оҠ…оҠ…](fg:bold green)'
error_symbol = '[оҠ…оҠ…](fg:bold red)'


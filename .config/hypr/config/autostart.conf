# Keep your existing exec-once commands
exec-once = ironbar 
exec-once = hyprpaper 
exec-once = swaync
exec-once = systemctl --user start hyprpolkitagent
exec-once = [workspace 1 silent] zen-browser
exec-once = [workspace 7 silent] tauon
exec-once = [workspace 3 silent] steam
exec-once = [workspace 6 silent] vesktop


exec-once = [workspace 2 silent] postman
exec-once = [workspace 2 silent] ghostty
exec-once = [workspace 2 silent] ghostty

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# Make sure these programs launch in their workspaces
windowrule = workspace 3 silent, class:steam
windowrule = workspace 6 silent, class:vesktop
windowrule = workspace 1 silent, class:zen


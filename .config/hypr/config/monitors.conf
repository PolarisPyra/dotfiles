################
### MONITORS ###
################
$monitor1 = desc:Acer Technologies KG271U TATAA0028524

# Basic monitor setup
monitor = $monitor1, 2560x1440@180, 0x0, 1


# Default workspaces for monitors
workspace = 1, monitor:$monitor1
workspace = 2, monitor:$monitor1
workspace = 3, monitor:$monitor1
workspace = 4, monitor:$monitor1
workspace = 5, monitor:$monitor1


# # Set default workspaces on startup
exec-once = hyprctl dispatch focusmonitor $monitor1
exec-once = hyprctl dispatch workspace 1

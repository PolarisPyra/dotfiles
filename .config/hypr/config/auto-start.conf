# Keep your existing exec-once commands
exec-once = waybar 
exec-once = hyprpaper 
exec-once = swaync
exec-once = systemctl --user start hyprpolkitagent
exec-once = [workspace 1 silent] zen-browser
exec-once = [workspace 2 silent] steam
exec-once = [workspace 3 silent] vesktop

# Make sure these programs launch in their workspaces
windowrule = workspace 1 silent, class:zen
windowrule = workspace 2 silent, class:steam
windowrule = workspace 3 silent, class:vesktop

